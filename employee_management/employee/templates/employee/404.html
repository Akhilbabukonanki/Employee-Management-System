{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found (404) - Employee Management System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .error-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
        }
        body.dark-mode .error-wrapper {
            background-color: #0b0f19;
        }
        .error-card {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 480px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="error-card">
            <!-- 404 animation/icon -->
            <div class="display-1 fw-bold text-primary mb-3">404</div>
            <div class="icon-box bg-warning bg-opacity-10 text-warning p-3 rounded-circle d-inline-flex justify-content-center align-items-center mb-4" style="width: 70px; height: 70px; font-size: 2rem;">
                <i class="bi bi-question-circle"></i>
            </div>
            
            <h2 class="fw-bold mb-2">Lost in Space?</h2>
            <p class="text-secondary mb-4">
                The page you are looking for does not exist or has been moved. Use the options below to find your way back.
            </p>

            <div class="d-flex gap-2 justify-content-center">
                {% if user.is_authenticated %}
                    <a href="{% url 'dashboard' %}" class="btn btn-primary fw-semibold px-4 py-2">
                        <i class="bi bi-speedometer2 me-1"></i> Dashboard
                    </a>
                    <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary fw-semibold px-4 py-2">
                        <i class="bi bi-people-fill me-1"></i> Directory
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-primary fw-semibold px-4 py-2">
                        <i class="bi bi-box-arrow-in-right me-1"></i> Sign In
                    </a>
                {% endif %}
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>

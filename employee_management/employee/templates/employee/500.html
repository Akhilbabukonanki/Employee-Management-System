{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Error (500) - Employee Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <style>
        .error-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
        }
    </style>
</head>
<body>
    <div class="error-wrapper">
        <div class="text-center p-4" style="max-width: 480px;">
            <div class="display-1 fw-bold text-danger mb-3">500</div>
            <div class="bg-danger bg-opacity-10 text-danger p-3 rounded-circle d-inline-flex justify-content-center align-items-center mb-4" style="width: 70px; height: 70px; font-size: 2rem;">
                <i class="bi bi-exclamation-octagon-fill"></i>
            </div>
            <h2 class="fw-bold mb-2">Internal Server Error</h2>
            <p class="text-secondary mb-4">
                Something went wrong on our end. Please try again later or contact your system administrator.
            </p>
            <div class="d-flex gap-2 justify-content-center">
                <a href="/" class="btn btn-primary fw-semibold px-4">
                    <i class="bi bi-house-fill me-1"></i> Go Home
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
